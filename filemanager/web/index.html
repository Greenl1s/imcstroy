<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Файлы</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="loginScreen" class="login-screen">
  <form id="loginForm" class="login-panel">
    <h1>Вход</h1>
    <label>Логин
      <input id="loginUsername" autocomplete="username" required>
    </label>
    <label>Пароль
      <input id="loginPassword" type="password" autocomplete="current-password" required>
    </label>
    <button class="primary" type="submit">Войти</button>
    <p id="loginError" class="error-text"></p>
  </form>
</div>

<div id="appScreen" class="app-screen hidden">

  <div class="rail">
    <button class="rail-btn" id="profileBtn" title="Профиль" aria-label="Профиль">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
    </button>
    <button class="rail-btn" id="logoutBtn" title="Выйти" aria-label="Выйти">
      <svg viewBox="0 0 24 24"><path d="M16 17l5-5-5-5M21 12H9M13 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7"/></svg>
    </button>
  </div>

  <div id="columnsView" class="columns-view">

    <div class="col" data-col="tools">
      <div class="col-header">
        <span>Инструменты</span>
        <button class="add-btn" id="addToolBtn" aria-label="Добавить ссылку">+</button>
      </div>
      <div class="col-body" id="toolsList"></div>
    </div>

    <div class="col" data-col="db">
      <div class="col-header">
        <span>База данных</span>
        <button class="add-btn" id="mkdirDbBtn" aria-label="Новая папка">+</button>
      </div>
      <div class="col-toolbar">
        <input type="text" class="col-search-input" id="dbSearchInput" placeholder="Поиск...">
        <select class="col-sort-select" id="dbSortSelect">
          <option value="name-asc">Имя А-Я</option>
          <option value="name-desc">Имя Я-А</option>
          <option value="size-asc">Размер ↑</option>
          <option value="size-desc">Размер ↓</option>
        </select>
      </div>
      <div class="col-body" id="dbList"></div>
    </div>

    <div class="col" data-col="cases">
      <div class="col-header">
        <span>Дела</span>
        <button class="add-btn" id="mkdirCasesBtn" aria-label="Новая папка">+</button>
      </div>
      <div class="col-toolbar">
        <input type="text" class="col-search-input" id="casesSearchInput" placeholder="Поиск...">
        <select class="col-sort-select" id="casesSortSelect">
          <option value="name-asc">Имя А-Я</option>
          <option value="name-desc">Имя Я-А</option>
          <option value="size-asc">Размер ↑</option>
          <option value="size-desc">Размер ↓</option>
        </select>
      </div>
      <div class="col-body" id="casesList"></div>
    </div>

  </div>

  <div id="folderView" class="folder-view hidden">
    <div class="folder-header">
      <div class="breadcrumbs" id="breadcrumbs"></div>
      <div class="folder-actions" id="folderActions">
        <div class="add-menu-wrap">
          <button class="upload-btn" id="addMenuBtn" type="button">Добавить</button>
          <div class="add-menu hidden" id="addMenu">
            <button type="button" id="addFolderOption">
              <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
              Новая папка
            </button>
            <button type="button" id="addDocxOption">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
              Текстовый документ
            </button>
            <button type="button" id="addXlsxOption">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
              Таблица
            </button>
          </div>
        </div>
        <button class="upload-btn" id="uploadTriggerBtn" type="button">Загрузить</button>
        <input type="file" id="uploadInput" multiple hidden>
        <input type="file" id="uploadFolderInput" webkitdirectory directory multiple hidden>
        <button class="back-btn" id="selectModeBtn" type="button">Выбрать</button>
        <button class="back-btn" id="backBtn">
          <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Назад к колонкам
        </button>
      </div>
      <div class="selection-bar hidden" id="selectionBar">
        <span id="selectionCount">Выбрано: 0</span>
        <div class="selection-actions">
          <button class="back-btn" id="downloadSelectedBtn" type="button">Скачать</button>
          <button class="back-btn" id="deleteSelectedBtn" type="button">Удалить</button>
          <button class="back-btn" id="cancelSelectBtn" type="button">Отмена</button>
        </div>
      </div>
      <div class="folder-toolbar" id="folderToolbar">
        <input type="text" id="folderSearchInput" placeholder="Поиск по этой папке и вложенным...">
        <select id="folderSortSelect">
          <option value="name-asc">Имя А-Я</option>
          <option value="name-desc">Имя Я-А</option>
          <option value="size-asc">Размер ↑</option>
          <option value="size-desc">Размер ↓</option>
        </select>
      </div>
    </div>
    <div class="folder-body" id="folderList"></div>
  </div>

</div>

<div id="usersOverlay" class="modal-overlay hidden">
  <div class="modal-panel">
    <div class="modal-header">
      <span>Пользователи</span>
      <button class="back-btn" id="usersCloseBtn">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        Закрыть
      </button>
    </div>

    <div id="usersList" class="users-list"></div>

    <div class="add-user-form">
      <h3>Добавить пользователя</h3>
      <div class="add-user-row">
        <label>Логин<input id="newUserLogin" autocomplete="off"></label>
        <label>Пароль<input id="newUserPassword" type="text" autocomplete="off"></label>
        <label>Роль
          <select id="newUserRole">
            <option value="employee">Сотрудник</option>
            <option value="admin">Администратор</option>
          </select>
        </label>
      </div>
      <div class="perm-checks">
        <label><input type="checkbox" id="newPermTools" checked> Инструменты</label>
        <label><input type="checkbox" id="newPermDb" checked> База данных</label>
        <label><input type="checkbox" id="newPermCases" checked> Дела</label>
      </div>
      <button class="primary" id="createUserBtn" type="button">Создать пользователя</button>
    </div>
  </div>
</div>

<div id="uploadPanel" class="upload-panel hidden">
  <div class="upload-panel-header">
    <span id="uploadPanelTitle">Загрузка</span>
    <button id="uploadPanelCloseBtn" aria-label="Закрыть">
      <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="uploadChoice" class="upload-choice">
    <button class="upload-choice-btn" id="chooseFilesBtn" type="button">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      Загрузить файлы
    </button>
    <button class="upload-choice-btn" id="chooseFolderBtn" type="button">
      <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      Загрузить папку
    </button>
  </div>
  <div id="uploadPanelList" class="upload-panel-list"></div>
</div>

<script src="/app.js"></script>
</body>
</html>
