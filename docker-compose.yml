# Три контейнера на одной машине.
#
#   caddy  — единственный, кто смотрит наружу. Отдаёт статику и проксирует /api.
#            Сам получает и продлевает сертификат Let's Encrypt.
#   api    — Node. Доступен только изнутри docker-сети.
#   db     — PostgreSQL. Порт наружу НЕ проброшен: до базы нельзя достучаться
#            из интернета в принципе, только через API.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      # Скрипты из этой папки выполняются автоматически при первом запуске
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Раскомментируйте, если нужен доступ к базе с этой же машины
    # (например, чтобы подключиться клиентом DBeaver через SSH-туннель):
    # ports:
    #   - "127.0.0.1:5432:5432"

  api:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      TOKEN_TTL: 12h
      PORT: 3000
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/web:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
